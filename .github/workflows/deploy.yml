name: CI/CD Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: pip install pytest pydantic

      - name: Run unit tests
        run: pytest tests/ -v

  deploy:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ai-recruiter
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Generate task definition
        run: |
          sed 's/AWS_ACCOUNT_ID/${{ secrets.AWS_ACCOUNT_ID }}/g' \
            ecs-task-definition.template.json > ecs-task-definition.json

      - name: Register task definition
        run: |
          aws ecs register-task-definition \
            --cli-input-json file://ecs-task-definition.json \
            --region us-east-2

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster ai-recruiter-cluster \
            --service ai-recruiter-service \
            --force-new-deployment \
            --region us-east-2

      - name: Wait for deployment
        run: |
          aws ecs wait services-stable \
            --cluster ai-recruiter-cluster \
            --services ai-recruiter-service \
            --region us-east-2
          echo "ECS deployment successful"

